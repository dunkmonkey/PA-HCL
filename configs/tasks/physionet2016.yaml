# PhysioNet 2016 二分类任务（任务专属配置）

task:
  name: "physionet2016"
  type: "classification"
  dataset: "physionet2016"
  description: "PhysioNet 2016 心音二分类任务"

data:
  base_dir: "/root/autodl-tmp/data/downstream"
  task_name: "physionet2016"
  sample_rate: 5000
  target_length: 4000

classification:
  num_classes: 2
  label_map:
    normal: 0
    abnormal: 1

evaluation:
  primary_metric: "auroc"
  metrics:
    - accuracy
    - auroc
    - auprc
    - f1
    - sensitivity
    - specificity
  save_confusion_matrix: true
  save_predictions: true

seed: 42
