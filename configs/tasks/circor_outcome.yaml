# CirCor 临床结果二分类任务（任务专属配置）

task:
  name: "circor_outcome"
  type: "classification"
  dataset: "circor"
  description: "CirCor 临床结果二分类任务"

data:
  base_dir: "/root/autodl-tmp/data/downstream"
  task_name: "circor_outcome"
  sample_rate: 5000
  target_length: 4000

classification:
  num_classes: 2
  label_map:
    Normal: 0
    Abnormal: 1

evaluation:
  primary_metric: "auroc"
  metrics:
    - accuracy
    - auroc
    - auprc
    - f1
    - sensitivity
    - specificity
  save_confusion_matrix: true
  save_predictions: true

seed: 42
