# PASCAL 心音三分类任务（任务专属配置）

task:
  name: "pascal"
  type: "classification"
  dataset: "pascal"
  description: "PASCAL 心音三分类任务"

data:
  base_dir: "/root/autodl-tmp/data/downstream"
  task_name: "pascal"
  sample_rate: 5000
  target_length: 4000

classification:
  num_classes: 3
  label_map:
    normal: 0
    murmur: 1
    extrasystole: 2

evaluation:
  primary_metric: "f1_macro"
  metrics:
    - accuracy
    - f1_macro
    - f1_weighted
    - auroc
    - precision_macro
    - recall_macro
  save_confusion_matrix: true
  save_predictions: true

seed: 42
