# CirCor 杂音检测三分类任务（任务专属配置）

task:
  name: "circor_murmur"
  type: "classification"
  dataset: "circor"
  description: "CirCor 杂音检测三分类任务"

data:
  base_dir: "/root/autodl-tmp/data/downstream"
  task_name: "circor_murmur"
  sample_rate: 5000
  target_length: 4000

classification:
  num_classes: 3
  label_map:
    Present: 0
    Absent: 1
    Unknown: 2

evaluation:
  primary_metric: "f1_macro"
  metrics:
    - accuracy
    - f1_macro
    - f1_weighted
    - auroc
    - precision_macro
    - recall_macro
  save_confusion_matrix: true
  save_predictions: true

seed: 42
