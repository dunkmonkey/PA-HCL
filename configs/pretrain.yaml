# PA-HCL 统一预训练配置（精简版）
# 说明：编码器结构参数已在代码中统一硬编码。

experiment:
  name: "pahcl_pretrain"
  description: "PCG 数据的 PA-HCL 自监督预训练"

data:
  processed_dir: "/root/autodl-tmp/data/processed"
  sample_rate: 5000
  num_substructures: 4

model:
  encoder_type: "cnn_mamba"  # 可选: cnn_mamba, sincnet_eca_mamba
  proj_hidden_dim: 512
  proj_output_dim: 128
  proj_num_layers: 2
  sub_proj_hidden_dim: 256
  sub_proj_output_dim: 64
  use_moco: false
  moco_momentum: 0.999
  queue_size: 8192

loss:
  temperature: 0.07
  lambda_cycle: 1.0
  lambda_sub: 1.0
  align_substructures: true

training:
  num_epochs: 100
  batch_size: 64
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  learning_rate: 2e-3
  weight_decay: 1e-4
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_eps: 1e-8
  warmup_epochs: 20
  min_lr: 1e-6
  use_amp: true
  gradient_accumulation_steps: 4
  grad_clip_norm: 1.0
  log_interval: 50
  save_interval: 10

augmentation:
  time_shift_max: 0.1
  amplitude_scale_range: [0.8, 1.2]
  gaussian_noise_std: 0.01
  time_stretch_range: [0.9, 1.1]
  time_mask_max_ratio: 0.006
  freq_mask_max_ratio: 0.15
  prob_time_shift: 0.5
  prob_amplitude_scale: 0.5
  prob_gaussian_noise: 0.5
  prob_time_stretch: 0.3
  prob_time_mask: 0.5
  prob_freq_mask: 0.3

distributed:
  backend: "nccl"
  find_unused_parameters: false

seed: 42
