# PA-HCL 微调配置（精简版）
# 说明：编码器结构参数已在代码中统一硬编码。

experiment:
  name: "pahcl_finetune"
  description: "PA-HCL 下游微调"

task:
  name: "default"
  type: "classification"

data:
  sample_rate: 5000
  target_length: 4000
  num_substructures: 4

model:
  encoder_type: "cnn_mamba"  # 可选: cnn_mamba, sincnet_eca_mamba

classifier:
  hidden_dim: 128
  dropout: 0.3
  use_bn: true
  use_ln: false
  num_layers: 1

training:
  num_epochs: 100
  batch_size: 32
  learning_rate: 1e-3
  weight_decay: 1e-4
  warmup_epochs: 5
  min_lr: 1e-7
  encoder_lr_scale: 0.1
  label_smoothing: 0.1
  use_class_weights: true
  early_stopping_patience: 15
  grad_clip_norm: 1.0
  num_workers: 4
  use_amp: true
  log_interval: 20
  save_interval: 10

pretrain:
  checkpoint_path: "checkpoints/pretrain/best_model.pt"
  load_encoder_only: true
  freeze_encoder: false

evaluation:
  primary_metric: "f1_macro"
  metrics:
    - accuracy
    - f1
    - f1_macro
    - auroc
    - precision
    - recall
  save_confusion_matrix: true

seed: 42
