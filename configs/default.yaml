# PA-HCL 默认配置（训练用）
# 此文件包含所有训练阶段的默认超参数和设置
# 注意：预处理相关配置请参考 configs/preprocess.yaml

# ============== 实验 ==============
experiment:
  name: "pa-hcl"
  seed: 42
  output_dir: "./checkpoints"
  log_dir: "./logs"
  
# ============== 数据（训练数据） ==============
data:
  # 训练用的数据设置
  processed_dir: "/root/autodl-tmp/data/processed"
  sample_rate: 5000        # Hz - 与预处理保持一致
  target_length: 4000      # 样本数(0.8s @ 5000Hz) - 与预处理保持一致
  num_substructures: 4     # K 值 - 与预处理保持一致
    
# ============== 增强 ==============
augmentation:
  # 时域增强参数
  time_shift_max: 0.1
  amplitude_scale_range: [0.8, 1.2]
  gaussian_noise_std: 0.01
  time_stretch_range: [0.9, 1.1]
  
  # 频域增强参数
  time_mask_max_ratio: 0.006          # 30ms / 5000Hz
  freq_mask_max_ratio: 0.15
  
  # 增强概率
  prob_time_shift: 0.5
  prob_amplitude_scale: 0.5
  prob_gaussian_noise: 0.5
  prob_time_stretch: 0.3
  prob_time_mask: 0.5
  prob_freq_mask: 0.3

# ============== 模型 ==============
model:
  # 编码器类型
  encoder_type: "cnn_mamba"  # cnn_mamba / cnn_transformer / cnn_only / sincnet_eca_mamba
  
  # CNN 主干
  cnn_channels: [32, 64, 128, 256]
  cnn_kernel_sizes: [7, 5, 5, 3]
  cnn_strides: [2, 2, 2, 2]
  cnn_dropout: 0.1
  
  # Mamba (SSM) 模块
  mamba_d_model: 256
  mamba_n_layers: 4
  mamba_d_state: 16
  mamba_expand: 2
  mamba_dropout: 0.1
  
  # 池化和投影
  pool_type: "mean"                    # mean / max / cls / asp
  proj_hidden_dim: 512                 # 投影头隐藏维度
  proj_output_dim: 128                 # 投影头输出维度(对比学习)
  proj_num_layers: 2                   # 投影头层数
  sub_proj_hidden_dim: 256             # 子结构投影隐藏维度
  sub_proj_output_dim: 64              # 子结构投影输出维度
  
  # MoCo 设置 (可选)
  use_moco: false                      # 是否启用动量编码器
  moco_momentum: 0.999
  queue_size: 8192
  
  # SincNet + ECA + ASP + Mamba 编码器 (轻量版本)
  # encoder_type: "sincnet_eca_mamba" 时启用
  sinc_out_channels: 64
  sinc_kernel_size: 251
  sinc_stride: 2
  stage1_channels: [64, 96]
  stage2_channels: [96, 128]
  use_groupnorm: true
  num_groups: 8
  eca_kernel_size: 3
  cycle_output_dim: 192
  
# ============== 分类器（下游任务用） ==============
classifier:
  hidden_dim: 128
  dropout: 0.3
  use_bn: true
  use_ln: false
  num_layers: 1
  
# ============== 损失 ==============
loss:
  # InfoNCE 设置
  temperature: 0.07
  
  # 分层权重
  lambda_cycle: 1.0
  lambda_sub: 1.0
  align_substructures: true           # 是否对齐子结构
  
  # 动态权重调度
  dynamic_weight:
    enabled: false
    warmup_epochs: 10

# ============== 训练（通用参数） ==============
training:
  # 基础训练超参
  num_epochs: 100           # 训练轮数
  batch_size: 64            # 批大小
  num_workers: 4            # 数据加载并行数
  pin_memory: true          # 加速 GPU 数据传输
  prefetch_factor: 2        # 预取批次数
  
  # 优化器参数
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_eps: 1.0e-8
  
  # 学习率调度
  warmup_epochs: 10
  min_lr: 1.0e-6
  
  # 混合精度和梯度控制
  use_amp: true
  gradient_accumulation_steps: 1
  grad_clip_norm: 1.0
  
  # 日志和保存
  log_interval: 50
  save_interval: 10
  
  # 下游任务（微调/监督学习）特定参数
  label_smoothing: 0.1
  use_class_weights: true
  early_stopping_patience: 15
  use_balanced_sampling: false

# ============== 数据缓存和增强 ==============
data_cache:
  cache_in_memory: true
  use_gpu_augment: true
  view_cache_refresh_epochs: 5

# ============== 分布式训练 ==============
distributed:
  backend: "nccl"
  find_unused_parameters: false

# ============== 可复现性 ==============
seed: 42
