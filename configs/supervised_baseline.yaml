# PA-HCL 监督学习基线配置（精简版）
# 说明：编码器结构参数已在代码中统一硬编码。

experiment:
  name: "supervised_baseline"
  description: "从零训练的监督学习基线"

task:
  name: "physionet2016"
  type: "classification"

data:
  sample_rate: 5000
  target_length: 4000
  num_substructures: 4

model:
  # 可选: cnn_mamba, sincnet_eca_mamba, resnet34_1d
  encoder_type: "cnn_mamba"

classifier:
  hidden_dim: 128
  dropout: 0.5
  use_bn: true
  use_ln: false
  num_layers: 1

training:
  num_epochs: 50
  batch_size: 128
  learning_rate: 1e-3
  weight_decay: 1e-4
  warmup_epochs: 10
  min_lr: 1e-7
  scheduler: "cosine"
  label_smoothing: 0.1
  use_class_weights: true
  grad_clip_norm: 1.0
  use_balanced_sampling: true
  loss_type: "ce"
  focal_gamma: 1.0
  early_stopping_patience: 20
  use_amp: true
  num_workers: 4
  pin_memory: true
  log_interval: 20
  save_interval: 10
  save_best_only: false

evaluation:
  primary_metric: "auroc"
  metrics:
    - accuracy
    - f1
    - f1_macro
    - auroc
    - auprc
    - precision
    - recall
    - specificity
  save_confusion_matrix: true
  save_predictions: true

optimizer:
  type: "adamw"
  betas: [0.9, 0.999]
  eps: 1e-8
  momentum: 0.9

tracking:
  use_wandb: false
  wandb_project: "PA-HCL-Supervised"
  wandb_entity: null
  use_tensorboard: true
  save_model_summary: true

seed: 42
device: "cuda"
distributed: false

data_cache:
  cache_in_memory: true
  view_cache_refresh_epochs: 5
  use_gpu_augment: true
