# PA-HCL 预训练配置 - SincNet+ECA+ASP+Mamba 编码器
# ==================================
# 使用轻量化 SincNet 编码器的自监督预训练配置
#
# 优势:
#   - 参数量减少 83% (从 218万 降至 36万)
#   - 训练速度更快，显存占用更小
#   - 更适合心音信号的频带特性
#   - 可解释的滤波器学习
#
# 用法:
#   python scripts/pretrain.py --config configs/pretrain_sincnet.yaml

# 实验信息
experiment:
  name: "pahcl_sincnet_pretrain"
  description: "使用 SincNet+ECA+ASP+Mamba 编码器的 PA-HCL 预训练"

# 数据设置
data:
  raw_dir: "/root/autodl-tmp/data/raw"
  processed_dir: "/root/autodl-tmp/data/processed"
  sample_rate: 5000
  segment_duration: 1.0
  num_substructures: 4
  
  # 预处理
  bandpass_low: 25
  bandpass_high: 400
  min_cycle_duration: 0.4
  max_cycle_duration: 1.5
  min_snr: 5.0

# 模型架构
model:
  # ============== 使用新的轻量编码器 ==============
  encoder_type: "sincnet_eca_mamba"
  
  # SincNet 前端
  sinc_out_channels: 64
  sinc_kernel_size: 251
  sinc_stride: 2
  
  # 阶段配置
  stage1_channels: [64, 96]
  stage2_channels: [96, 128]
  
  # 轻量 Mamba (相比原始减少 50% 层数和维度)
  mamba_d_model: 128
  mamba_n_layers: 2
  mamba_d_state: 16
  mamba_d_conv: 4
  mamba_expand: 2
  mamba_dropout: 0.1
  
  # 归一化和注意力
  use_groupnorm: true
  num_groups: 8
  eca_kernel_size: 3
  
  # 输出配置
  cycle_output_dim: 192
  num_substructures: 4
  pool_type: "asp"  # 使用 Attentive Statistics Pooling
  
  # 投影头 (输入维度从 256 改为 192)
  proj_hidden_dim: 512
  proj_output_dim: 128
  proj_num_layers: 2
  
  # 子结构投影 (输入维度保持 128)
  sub_proj_hidden_dim: 256
  sub_proj_output_dim: 64
  
  # MoCo 设置 (可选，用于大规模预训练)
  use_moco: false
  moco_momentum: 0.999
  queue_size: 8192

# 损失函数
loss:
  temperature: 0.07
  lambda_cycle: 1.0
  lambda_sub: 1.0
  align_substructures: true

# 训练设置
training:
  # 基础设置
  num_epochs: 100
  batch_size: 64
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  
  # 优化器
  # 由于参数量减少，可以使用更大的批量大小或更高的学习率
  learning_rate: 2e-3
  weight_decay: 1e-4
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_eps: 1e-8
  
  # 调度器
  warmup_epochs: 20
  min_lr: 1e-6
  
  # 训练技巧
  use_amp: true
  gradient_accumulation_steps: 4  # 有效 batch_size = 64 * 4 = 256
  grad_clip_norm: 1.0
  
  # 日志和保存
  log_interval: 50
  save_interval: 10

# 数据增强
augmentation:
  # 时域
  time_shift_max: 0.1
  amplitude_scale_range: [0.8, 1.2]
  gaussian_noise_std: 0.01
  time_stretch_range: [0.9, 1.1]
  
  # 频域
  time_mask_max_ratio: 0.006
  freq_mask_max_ratio: 0.15
  
  # 概率
  prob_time_shift: 0.5
  prob_amplitude_scale: 0.5
  prob_gaussian_noise: 0.5
  prob_time_stretch: 0.3
  prob_time_mask: 0.5
  prob_freq_mask: 0.3

# 分布式训练
distributed:
  backend: "nccl"
  find_unused_parameters: false

# 可复现性
seed: 42

# ============== 性能优化建议 ==============
# 1. 显存优化:
#    - 由于参数量减少 83%，可以尝试更大的 batch_size (如 96 或 128)
#    - 或启用更多的 gradient_accumulation_steps
#
# 2. SincNet 特定优化:
#    - 前 10 轮可以冻结 SincNet 参数，先优化其他层
#    - 或给 SincNet 使用更小的学习率 (如 1e-4)
#
# 3. 训练策略:
#    - 可以先用小数据集验证收敛性
#    - 确认 SincNet 学习到合理的频率范围 (25-400Hz)
#    - 使用 test_sincnet_encoder.py 监控滤波器频率
